<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wonder Journal - Login</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/index.css">
    <script>
        // Stel direct het systeem-thema in (voorkomt flash)
        (function() {
            const theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
            // Luister naar systeemwijzigingen (bijv. telefoon switcht naar dark mode)
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
            });
        })();
    </script>
</head>
<body>
    <div class="login-wrapper">
        <div id="auth-welcome-screen" class="auth-card active">
            <div class="brand-header">
                <span class="lightning-icon">📆</span>
                <h1>Wonder Journal</h1>
                <p>Welcome! Please choose how to connect</p>
            </div>

            <div class="button-group">
                <button class="btn btn-wonder" id="btn-show-wonder">
                    Sign in with Wonder⚡
                </button>
                
                <div class="separator">OR</div>
                
                <button class="btn btn-google" id="btn-google-welcome">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google logo" class="google-icon">
                    Continue with Google
                </button>
            </div>
        </div>

        <div id="auth-wonder-screen" class="auth-card">
            <div class="brand-header">
                <div class="logo-row">
                    <span class="lightning-icon-small">⚡</span>
                    <h1>Wonder ID</h1>
                </div>
                <p class="subtitle">Connect to Wonderlight Studios</p>
            </div>

            <form id="wonder-login-form">
                <div class="input-group">
                    <label for="email">EMAIL ADDRESS</label>
                    <input type="email" id="email" placeholder="name@example.com" required autocomplete="email">
                </div>

                <div class="input-group">
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-submit">Sign In</button>
            </form>

            <div class="separator">OR</div>

            <button class="btn btn-google" id="btn-google-wonder">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google logo" class="google-icon">
                Continue with Google
            </button>

            <div class="auth-footer">
                <a href="#" class="footer-link" id="link-forgot-password">Forgot Password?</a>
                <p class="footer-text">Don't have an account? <a href="#" class="footer-link highlighted" id="link-sign-up">Sign Up</a></p>
            </div>
            
            <button class="btn-back" id="btn-back-to-welcome">← Back</button>
        </div>
    </div>

    <script src="js/register.js"></script>
</body>
</html>
